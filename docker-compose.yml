services:
  geoshape:
    build: .
    image: geo-shape:latest
    container_name: geoshape
    restart: unless-stopped
    init: true

    ports:
      - "3000:3000"

    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: "production"
      GEOSHAPE_DB: "/data/geoshape.db"
      GEOSHAPE_ALLOWED_ORIGINS: "https://geoshape.example.com"

    volumes:
      - "/data:/data"
