<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>GeoShape — %sveltekit.status%</title>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<style>
			:root {
				--bg: #f4e3bf;
				--surface: #ffffff;
				--main: #ffcd00;
				--border: #3b2c45;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100svh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 1rem;
				background: var(--bg);
				color: var(--border);
				font-family:
					'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
				-webkit-font-smoothing: antialiased;
			}
			.card {
				width: 100%;
				max-width: 28rem;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1rem;
				padding: 2rem 1.5rem;
				text-align: center;
				background: var(--surface);
				border: 2px solid var(--border);
				border-radius: 8px;
				box-shadow: 6px 6px 0 0 var(--border);
			}
			.logo {
				font-size: 1.5rem;
				font-weight: 800;
				padding: 0.25rem 0.75rem;
				background: var(--main);
				border: 2px solid var(--border);
				border-radius: 8px;
				box-shadow: 4px 4px 0 0 var(--border);
			}
			.status {
				font-size: 3rem;
				font-weight: 800;
				font-variant-numeric: tabular-nums;
				line-height: 1;
			}
			p {
				margin: 0;
				font-size: 0.875rem;
				font-weight: 700;
				color: rgba(59, 44, 69, 0.6);
			}
			a {
				display: inline-flex;
				align-items: center;
				height: 2.75rem;
				padding: 0 1.25rem;
				font-weight: 800;
				text-decoration: none;
				color: var(--border);
				background: var(--main);
				border: 2px solid var(--border);
				border-radius: 8px;
				box-shadow: 4px 4px 0 0 var(--border);
				transition: all 0.15s;
			}
			a:hover,
			a:active {
				transform: translate(3px, 3px);
				box-shadow: none;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<span class="logo">GeoShape</span>
			<span class="status">%sveltekit.status%</span>
			<p>%sveltekit.error.message%</p>
			<a href="/">Zur Startseite</a>
		</div>
	</body>
</html>
